# Netlify configuration for PresetForge AI
# Ensures ES6 modules are served with correct MIME type

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/ui/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/core/*/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[build]
  publish = "."
